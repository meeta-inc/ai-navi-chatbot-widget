<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Navi 챗봇 위젯 - 모바일 테스트</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .test-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .device-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin-bottom: 20px;
        }
        .test-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .info-box {
            background: #e6f7ff;
            border-left: 4px solid #1890ff;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .mobile-test-frame {
            width: 375px;
            height: 667px;
            border: 16px solid #333;
            border-radius: 36px;
            margin: 20px auto;
            position: relative;
            background: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .mobile-test-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
        }
        @media (max-width: 480px) {
            .mobile-test-frame {
                width: 100%;
                height: 600px;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Navi 챗봇 위젯</h1>
        <p class="subtitle">모바일 트리거 버튼 테스트</p>

        <div class="test-section">
            <h2>📱 디바이스 정보</h2>
            <div class="device-info" id="deviceInfo">
                감지 중...
            </div>
        </div>

        <div class="test-section">
            <h2>🎨 디자인 스펙</h2>
            <div class="info-box">
                <strong>모바일 트리거 버튼:</strong><br>
                - 크기: 80px × 80px<br>
                - 배경색: #F97316 (Orange)<br>
                - 그림자: 2px 4px 4px rgba(0,0,0,0.25)<br>
                - 아이콘: 24px × 24px 메시지 아이콘
            </div>
        </div>

        <div class="test-section">
            <h2>🔧 테스트 컨트롤</h2>
            <div class="test-controls">
                <button onclick="toggleWidget()">위젯 토글</button>
                <button onclick="simulateMobile()">모바일 시뮬레이션</button>
                <button onclick="simulateDesktop()">데스크톱 시뮬레이션</button>
                <button onclick="location.reload()">새로고침</button>
            </div>
        </div>

        <div class="test-section">
            <h2>📱 모바일 프레임 테스트</h2>
            <div class="mobile-test-frame">
                <iframe src="about:blank" id="mobileFrame"></iframe>
            </div>
        </div>
    </div>

    <!-- 챗봇 위젯 스크립트 -->
    <script src="src/chatbot-widget.js"></script>
    <script>
        // 디바이스 정보 표시
        function updateDeviceInfo() {
            const info = {
                userAgent: navigator.userAgent,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                viewportWidth: window.innerWidth,
                viewportHeight: window.innerHeight,
                devicePixelRatio: window.devicePixelRatio,
                isMobile: /iPhone|iPod|Android.*Mobile/i.test(navigator.userAgent) || window.innerWidth <= 480
            };
            
            document.getElementById('deviceInfo').innerHTML = `
                <strong>User Agent:</strong> ${info.userAgent}<br>
                <strong>Screen:</strong> ${info.screenWidth} × ${info.screenHeight}<br>
                <strong>Viewport:</strong> ${info.viewportWidth} × ${info.viewportHeight}<br>
                <strong>Pixel Ratio:</strong> ${info.devicePixelRatio}<br>
                <strong>모바일 감지:</strong> ${info.isMobile ? '✅ 모바일' : '❌ 데스크톱'}
            `;
        }

        // 위젯 초기화
        const widget = new ChatbotWidget({
            title: 'AI Navi 챗봇',
            primaryColor: '#F97316',
            secondaryColor: '#ea580c',
            chatbotUrl: 'https://ainavi-dev.meeta.jp/',
            position: 'right'
        });

        // 위젯 토글
        function toggleWidget() {
            if (widget.isOpen) {
                widget.close();
            } else {
                widget.open();
            }
        }

        // 모바일 시뮬레이션
        function simulateMobile() {
            // viewport 변경
            const viewport = document.querySelector('meta[name="viewport"]');
            viewport.content = 'width=375, initial-scale=1.0';
            location.reload();
        }

        // 데스크톱 시뮬레이션
        function simulateDesktop() {
            const viewport = document.querySelector('meta[name="viewport"]');
            viewport.content = 'width=1024, initial-scale=1.0';
            location.reload();
        }

        // 모바일 프레임에 페이지 로드
        function loadMobileFrame() {
            const frame = document.getElementById('mobileFrame');
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <style>
                        body { 
                            margin: 0; 
                            padding: 20px;
                            font-family: -apple-system, sans-serif;
                            background: #f0f0f0;
                        }
                        h3 { color: #333; }
                        p { color: #666; }
                    </style>
                </head>
                <body>
                    <h3>모바일 프레임 테스트</h3>
                    <p>이 프레임 내에서 챗봇 위젯을 테스트합니다.</p>
                    <script src="src/chatbot-widget.js"><\/script>
                    <script>
                        new ChatbotWidget({
                            title: 'AI Navi 챗봇',
                            primaryColor: '#F97316',
                            position: 'right'
                        });
                    <\/script>
                </body>
                </html>
            `;
            frame.srcdoc = html;
        }

        // 초기화
        updateDeviceInfo();
        loadMobileFrame();
        window.addEventListener('resize', updateDeviceInfo);
    </script>
</body>
</html>
