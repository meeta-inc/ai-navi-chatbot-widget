<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Navi チャットボットウィジェット - モバイルテスト</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .test-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .device-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin-bottom: 20px;
        }
        .test-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .info-box {
            background: #e6f7ff;
            border-left: 4px solid #1890ff;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .mobile-test-frame {
            width: 375px;
            height: 667px;
            border: 16px solid #333;
            border-radius: 36px;
            margin: 20px auto;
            position: relative;
            background: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .mobile-test-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
        }
        @media (max-width: 480px) {
            .mobile-test-frame {
                width: 100%;
                height: 600px;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Navi チャットボットウィジェット</h1>
        <p class="subtitle">モバイルトリガーボタンテスト</p>

        <div class="test-section">
            <h2>📱 デバイス情報</h2>
            <div class="device-info" id="deviceInfo">
                検出中...
            </div>
        </div>

        <div class="test-section">
            <h2>🎨 デザインスペック</h2>
            <div class="info-box">
                <strong>モバイルトリガーボタン:</strong><br>
                - サイズ: 80px × 80px<br>
                - 背景色: #F97316 (Orange)<br>
                - 影: 2px 4px 4px rgba(0,0,0,0.25)<br>
                - アイコン: 24px × 24px メッセージアイコン
            </div>
        </div>

        <div class="test-section">
            <h2>🔧 テストコントロール</h2>
            <div class="test-controls">
                <button onclick="toggleWidget()">ウィジェットトグル</button>
                <button onclick="simulateMobile()">モバイルシミュレーション</button>
                <button onclick="simulateDesktop()">デスクトップシミュレーション</button>
                <button onclick="location.reload()">更新</button>
            </div>
        </div>

        <div class="test-section">
            <h2>📱 モバイルフレームテスト</h2>
            <div class="mobile-test-frame">
                <iframe src="about:blank" id="mobileFrame"></iframe>
            </div>
        </div>
    </div>

    <!-- チャットボットウィジェットスクリプト -->
    <script src="src/chatbot-widget.js"></script>
    <script>
        // デバイス情報表示
        function updateDeviceInfo() {
            const info = {
                userAgent: navigator.userAgent,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                viewportWidth: window.innerWidth,
                viewportHeight: window.innerHeight,
                devicePixelRatio: window.devicePixelRatio,
                isMobile: /iPhone|iPod|Android.*Mobile/i.test(navigator.userAgent) || window.innerWidth <= 480
            };
            
            document.getElementById('deviceInfo').innerHTML = `
                <strong>User Agent:</strong> ${info.userAgent}<br>
                <strong>Screen:</strong> ${info.screenWidth} × ${info.screenHeight}<br>
                <strong>Viewport:</strong> ${info.viewportWidth} × ${info.viewportHeight}<br>
                <strong>Pixel Ratio:</strong> ${info.devicePixelRatio}<br>
                <strong>モバイル検出:</strong> ${info.isMobile ? '✅ モバイル' : '❌ デスクトップ'}
            `;
        }

        // ウィジェット初期化（環境変数対応）
        const widget = new ChatbotWidget({
            title: 'AI Navi チャットボット',
            primaryColor: '#F97316',
            secondaryColor: '#ea580c',
            position: 'right',
            clientId: '%VITE_CLIENT_ID%',
            appId: '%VITE_APP_ID%',
            chatbotUrl: '%VITE_CHATBOT_URL%'
        });

        // ウィジェットトグル
        function toggleWidget() {
            if (widget.isOpen) {
                widget.close();
            } else {
                widget.open();
            }
        }

        // モバイルシミュレーション
        function simulateMobile() {
            // viewport変更
            const viewport = document.querySelector('meta[name="viewport"]');
            viewport.content = 'width=375, initial-scale=1.0';
            location.reload();
        }

        // デスクトップシミュレーション
        function simulateDesktop() {
            const viewport = document.querySelector('meta[name="viewport"]');
            viewport.content = 'width=1024, initial-scale=1.0';
            location.reload();
        }

        // モバイルフレームにページロード
        function loadMobileFrame() {
            const frame = document.getElementById('mobileFrame');
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <style>
                        body { 
                            margin: 0; 
                            padding: 20px;
                            font-family: -apple-system, sans-serif;
                            background: #f0f0f0;
                        }
                        h3 { color: #333; }
                        p { color: #666; }
                    </style>
                </head>
                <body>
                    <h3>モバイルフレームテスト</h3>
                    <p>このフレーム内でチャットボットウィジェットをテストします。</p>
                    <script src="src/chatbot-widget.js"><\/script>
                    <script>
                        new ChatbotWidget({
                            title: 'AI Navi チャットボット',
                            primaryColor: '#F97316',
                            position: 'right'
                        });
                    <\/script>
                </body>
                </html>
            `;
            frame.srcdoc = html;
        }

        // 初期化
        updateDeviceInfo();
        loadMobileFrame();
        window.addEventListener('resize', updateDeviceInfo);
    </script>
</body>
</html>
