version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        # 환경변수 확인 (디버깅용)
        - echo "VITE_CLIENT_ID=$VITE_CLIENT_ID"
        - echo "VITE_APP_ID=$VITE_APP_ID"
        - echo "VITE_CHATBOT_URL=$VITE_CHATBOT_URL"
        - echo "VITE_DEMO_TITLE=$VITE_DEMO_TITLE"
        # .env 파일 생성 (Amplify 환경변수를 .env로 복사)
        - |
          echo "VITE_CLIENT_ID=$VITE_CLIENT_ID" > .env
          echo "VITE_APP_ID=$VITE_APP_ID" >> .env
          echo "VITE_CHATBOT_URL=$VITE_CHATBOT_URL" >> .env
          echo "VITE_DEMO_TITLE=$VITE_DEMO_TITLE" >> .env
        - cat .env
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*